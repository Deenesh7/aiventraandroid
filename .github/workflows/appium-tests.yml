name: Appium E2E Automation Tests

on:
  push:
    branches: [ main, master, "**" ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r appium_tests/requirements.txt

    - name: Run Appium Tests
      run: |
        python appium_tests/appium_e2e_tests.py

    - name: Upload Excel Test Report
      uses: actions/upload-artifact@v4
      with:
        name: appium-test-report
        path: appium_tests/Appium_Test_Results.xlsx
